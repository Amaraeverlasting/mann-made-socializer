<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Mann Made Socializer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1a1a24;
    --surface3: #22222f;
    --accent: #7c6df0;
    --accent-hover: #6a5cd8;
    --accent-dim: rgba(124,109,240,0.15);
    --text: #e8e8f0;
    --text-dim: #8888aa;
    --border: #2a2a3a;
    --red: #ef4444;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-wrap {
    width: 100%;
    max-width: 420px;
    padding: 24px;
  }

  .brand {
    text-align: center;
    margin-bottom: 40px;
  }

  .brand-mark {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 16px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -1px;
  }

  .brand h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .brand p {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 4px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 8px;
  }

  input[type="email"],
  input[type="password"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }

  input[type="email"]:focus,
  input[type="password"]:focus {
    border-color: var(--accent);
  }

  input[type="email"]::placeholder,
  input[type="password"]::placeholder {
    color: var(--text-dim);
  }

  .btn-login {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    font-family: inherit;
    margin-top: 8px;
  }

  .btn-login:hover {
    background: var(--accent-hover);
  }

  .btn-login:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .error-msg {
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--red);
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
  }

  .error-msg.show {
    display: block;
  }

  .footer {
    text-align: center;
    margin-top: 24px;
    color: var(--text-dim);
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-mark">MM</div>
    <h1>Mann Made Socializer</h1>
    <p>Sign in to your account</p>
  </div>
  <div class="card">
    <div class="error-msg" id="errorMsg"></div>
    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" autofocus required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Sign in</button>
    </form>
  </div>
  <div class="footer">Mann Made Media &middot; All rights reserved</div>
</div>

<script>
  const form = document.getElementById('loginForm');
  const btn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
  }

  function hideError() {
    errorMsg.classList.remove('show');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email, password }),
      });

      if (res.ok) {
        const next = new URLSearchParams(window.location.search).get('next') || '/';
        window.location.href = next;
      } else {
        const data = await res.json().catch(() => ({}));
        showError(data.detail || 'Invalid email or password. Please try again.');
      }
    } catch (err) {
      showError('Connection error. Please check the server is running.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
